<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrashQuote — Instant Repair Estimates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --cream:#FBF8F3; --card:#FFFFFF; --ink:#1D2B2A; --slate:#5C6B6A;
    --mist:#E8EDEB; --line:#EAE4DA;
    --teal:#0E8B8B; --teal-soft:#E3F2F1; --teal-deep:#0A6E6E;
    --amber:#F2A03D; --amber-soft:#FDF0DE;
    --rose:#E6786B; --rose-soft:#FBE9E6;
    --green:#4CAF82; --green-soft:#E4F4EC;
    --shadow:0 4px 20px rgba(29,43,42,0.06); --shadow-lg:0 12px 40px rgba(29,43,42,0.10);
  }
  body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--ink);line-height:1.5;}
  .display{font-family:'Bricolage Grotesque',sans-serif;}
  input,select,button{font-family:inherit;}
  input:focus{outline:none;border-color:var(--teal)!important;box-shadow:0 0 0 3px var(--teal-soft);}

  /* App shell */
  .app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  @media(min-width:880px){ .app{max-width:1080px;} }

  /* Top bar */
  .topbar{display:flex;align-items:center;gap:12px;padding:18px 22px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .mark{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--teal),var(--teal-deep));display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(14,139,139,0.28);}
  .mark svg{width:23px;height:23px;}
  .brandname{font-size:18px;font-weight:700;letter-spacing:-0.3px;}
  .brandsub{font-size:11px;color:var(--slate);margin-top:-2px;}
  .trust{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--teal-deep);background:var(--teal-soft);padding:7px 13px;border-radius:30px;font-weight:500;}
  .trust .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-soft);}

  /* Journey progress */
  .journey{display:flex;align-items:center;padding:6px 22px 22px;gap:0;}
  .jstep{display:flex;flex-direction:column;align-items:center;gap:7px;flex:0 0 auto;}
  .jdot{width:34px;height:34px;border-radius:50%;background:var(--mist);color:var(--slate);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;transition:all .4s cubic-bezier(.4,0,.2,1);border:2px solid transparent;}
  .jstep.done .jdot{background:var(--green);color:#fff;}
  .jstep.now .jdot{background:var(--teal);color:#fff;box-shadow:0 0 0 5px var(--teal-soft);transform:scale(1.08);}
  .jlabel{font-size:11px;color:var(--slate);font-weight:500;white-space:nowrap;}
  .jstep.now .jlabel{color:var(--teal-deep);font-weight:600;}
  .jbar{flex:1;height:2px;background:var(--mist);margin:0 4px;position:relative;top:-15px;border-radius:2px;overflow:hidden;}
  .jbar .fill{position:absolute;inset:0;width:0;background:var(--green);transition:width .5s ease;}
  .jbar.filled .fill{width:100%;}

  /* Content */
  .content{padding:4px 22px 40px;flex:1;}
  .h1{font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.5px;line-height:1.15;margin-bottom:6px;}
  .sub{font-size:14px;color:var(--slate);margin-bottom:22px;max-width:42ch;}

  .card{background:var(--card);border-radius:20px;padding:22px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:16px;}
  .card-h{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px;}
  .card-hint{font-size:12px;color:var(--slate);margin-bottom:16px;}

  .field-label{font-size:12px;font-weight:500;color:var(--slate);margin-bottom:7px;display:block;}
  .fld{width:100%;background:var(--cream);border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;font-size:15px;color:var(--ink);transition:all .2s;}
  .fld::placeholder{color:#A8B2B1;}
  .vgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  .vgrid .span2{grid-column:1 / -1;}

  /* Photo zone */
  .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
  @media(min-width:880px){ .pgrid{grid-template-columns:repeat(4,1fr);} }
  .photo{position:relative;aspect-ratio:1;border-radius:15px;overflow:hidden;background:var(--mist);box-shadow:var(--shadow);}
  .photo img{width:100%;height:100%;object-fit:cover;}
  .photo .del{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(29,43,42,.55);backdrop-filter:blur(6px);color:#fff;border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .addtile{aspect-ratio:1;border-radius:15px;border:2px dashed #CBD5D4;background:var(--teal-soft);color:var(--teal-deep);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:all .2s;font-weight:500;}
  .addtile:active{transform:scale(.97);background:#D5EAE9;}
  .addtile .pic{font-size:26px;line-height:1;}
  .addtile .t{font-size:11px;}

  /* Buttons */
  .btn{width:100%;border:none;border-radius:15px;padding:17px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;}
  .btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#fff;box-shadow:0 8px 22px rgba(14,139,139,.3);}
  .btn-primary:active{transform:translateY(1px);box-shadow:0 4px 14px rgba(14,139,139,.3);}
  .btn-ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line);box-shadow:var(--shadow);}
  .btn-amber{background:linear-gradient(135deg,var(--amber),#E08A28);color:#fff;box-shadow:0 8px 22px rgba(242,160,61,.3);}
  .btnrow{display:flex;gap:11px;}
  .btnrow .btn{flex:1;}
  .btnrow .grow{flex:2;}

  /* Severity pills */
  .pill{font-size:11px;font-weight:600;padding:5px 12px;border-radius:30px;display:inline-flex;align-items:center;gap:5px;}
  .pill .pdot{width:6px;height:6px;border-radius:50%;}

  /* Assessment cards */
  .assess-summary{background:linear-gradient(135deg,#FFFFFF,#FBFCFB);border-left:4px solid var(--teal);}
  .panel-row{background:var(--card);border-radius:17px;padding:17px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:12px;transition:transform .2s;}
  .panel-row:active{transform:scale(.99);}
  .panel-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:9px;}
  .panel-name{font-size:16px;font-weight:600;letter-spacing:-0.2px;}
  .panel-notes{font-size:13px;color:var(--slate);line-height:1.5;}
  .panel-meta{display:flex;gap:14px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-size:12px;color:var(--slate);}
  .panel-meta b{color:var(--ink);font-weight:600;}

  /* Quote line items */
  .li{background:var(--card);border-radius:16px;padding:15px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:11px;}
  .li-desc{width:100%;border:none;background:transparent;font-size:15px;font-weight:600;color:var(--ink);margin-bottom:11px;padding:2px 0;}
  .li-desc:focus{outline:none;}
  .li-inputs{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:9px;align-items:end;}
  .mini-label{font-size:10px;color:var(--slate);font-weight:500;margin-bottom:4px;display:block;}
  .mini-fld{width:100%;background:var(--cream);border:1.5px solid var(--line);border-radius:11px;padding:10px;font-size:14px;text-align:center;}
  .li-del{width:42px;height:42px;border-radius:11px;background:var(--rose-soft);color:var(--rose);border:none;cursor:pointer;font-size:18px;}
  .li-total{text-align:right;font-size:12px;color:var(--slate);margin-top:9px;}
  .li-total b{color:var(--teal-deep);font-size:14px;}

  .add-line{width:100%;border:1.5px dashed #CBD5D4;background:transparent;border-radius:14px;padding:13px;color:var(--teal-deep);font-weight:600;font-size:14px;cursor:pointer;margin-bottom:16px;}

  /* Totals summary */
  .totals{background:linear-gradient(160deg,#FFFFFF,#FBFCFB);border-radius:20px;padding:20px 22px;box-shadow:var(--shadow);border:1px solid var(--line);}
  .totline{display:flex;justify-content:space-between;font-size:14px;color:var(--slate);padding:6px 0;}
  .totline.grand{font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:700;color:var(--ink);border-top:2px solid var(--line);margin-top:9px;padding-top:14px;letter-spacing:-0.5px;}
  .totline.grand .amt{color:var(--teal-deep);}

  /* Analysing state */
  .analysing{text-align:center;padding:70px 22px;}
  .scanner{width:90px;height:90px;margin:0 auto 26px;border-radius:50%;background:var(--teal-soft);display:flex;align-items:center;justify-content:center;position:relative;}
  .scanner::after{content:"";position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:var(--teal);animation:spin 1s linear infinite;}
  .scanner svg{width:40px;height:40px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .anah{font-family:'Bricolage Grotesque',sans-serif;font-size:21px;font-weight:700;margin-bottom:8px;}
  .anasub{font-size:14px;color:var(--slate);max-width:34ch;margin:0 auto;}

  /* Success */
  .success-mark{width:78px;height:78px;border-radius:50%;background:var(--green-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop{0%{transform:scale(0);}100%{transform:scale(1);}}
  .success-mark svg{width:38px;height:38px;}

  .info-strip{background:var(--amber-soft);border-radius:14px;padding:13px 16px;font-size:12.5px;color:#8A5A14;display:flex;gap:9px;align-items:flex-start;margin-top:14px;line-height:1.5;}

  .err{background:var(--rose-soft);border-radius:14px;padding:14px 16px;font-size:13px;color:#B5453A;margin-bottom:16px;}

  .fade{animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  /* Desktop two-column for quote */
  @media(min-width:880px){
    .content{padding:4px 32px 50px;}
    .desktop-split{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start;}
    .desktop-sticky{position:sticky;top:20px;}
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<input id="fileInput" type="file" accept="image/*" multiple style="display:none">

<script>
const SHOP_RATE = 95;
const state = { screen:"capture", photos:[], vehicle:{rego:"",make:"",model:"",year:"",colour:""}, damage:null, lineItems:[], error:"" };

const SEV = {
  minor:{c:"#4CAF82",bg:"#E4F4EC",label:"Minor"},
  moderate:{c:"#F2A03D",bg:"#FDF0DE",label:"Moderate"},
  heavy:{c:"#E6786B",bg:"#FBE9E6",label:"Heavy"},
  severe:{c:"#D9534F",bg:"#FBE3E2",label:"Severe"},
};
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

const fileInput=document.getElementById("fileInput");
fileInput.addEventListener("change",e=>{
  const files=Array.from(e.target.files||[]); if(!files.length)return;
  let pending=files.length;
  files.forEach(f=>{const r=new FileReader();r.onload=()=>{state.photos.push({dataUrl:r.result,base64:r.result.split(",")[1],mime:f.type||"image/jpeg"});if(--pending===0)render();};r.readAsDataURL(f);});
  e.target.value="";
});
const pickPhotos=()=>fileInput.click();
const setVeh=(k,v)=>{state.vehicle[k]=v;};
const delPhoto=i=>{state.photos.splice(i,1);render();};

async function analyze(){
  if(state.photos.length===0){state.error="Add at least one photo so we can assess the damage.";render();return;}
  state.error="";state.screen="analyzing";render();
  const photos=state.photos.slice(0,6).map(p=>({base64:p.base64,mime:p.mime}));
  try{
    // When deployed behind the backend, this hits /api/analyze.
    // Falls back to direct call when running inside the Claude preview.
    let parsed;
    const useBackend = !location.href.startsWith("blob:") && !location.href.startsWith("about:");
    const v=state.vehicle;
    const prompt=`You are an expert panel & paint damage assessor for a NZ collision repair shop. Analyse the attached vehicle photo(s) for crash damage.

Vehicle context: ${v.make||"unknown make"} ${v.model||""} ${v.year||""}, colour ${v.colour||"unknown"}.

Respond with ONLY valid JSON (no markdown, no preamble) in this exact shape:
{
  "summary": "one friendly, reassuring sentence a customer would understand",
  "panels": [
    { "panel": "panel name e.g. Front Bumper", "severity": "minor|moderate|heavy|severe", "repair_method": "PDR|Fill & Paint|Replace|Blend", "labour_hours": number, "notes": "short plain-language note" }
  ],
  "flags": ["any structural/safety/ADAS concerns"],
  "paint_complexity": "solid|metallic|pearl|tri-coat"
}

If you cannot clearly see damage, give your best professional estimate. Use standard collision-repair panel names. Keep notes friendly and jargon-light.`;
    try{
      const resp=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({photos,vehicle:state.vehicle})});
      if(!resp.ok)throw new Error("backend-miss");
      parsed=await resp.json();
      if(parsed.error)throw new Error(parsed.error);
    }catch(backendErr){
      // direct fallback (works in the Claude preview environment)
      const imageBlocks=photos.map(p=>({type:"image",source:{type:"base64",media_type:p.mime,data:p.base64}}));
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:[...imageBlocks,{type:"text",text:prompt}]}]})});
      const data=await r.json();
      const text=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
    }
    state.damage=parsed;
    state.lineItems=parsed.panels.map((p,i)=>({id:i,desc:`${p.panel} — ${p.repair_method}`,hours:p.labour_hours||1,rate:SHOP_RATE,parts:p.repair_method==="Replace"?350:0,severity:p.severity||"minor"}));
    state.screen="review";render();
  }catch(err){
    state.error="We couldn't analyse those photos just now. Please try again — clear, well-lit shots work best.";state.screen="capture";render();
  }
}

const updItem=(id,f,val)=>{const it=state.lineItems.find(x=>x.id===id);if(it){it[f]=val;recalc();}};
const remItem=id=>{state.lineItems=state.lineItems.filter(x=>x.id!==id);render();};
const addItem=()=>{state.lineItems.push({id:Date.now(),desc:"New repair item",hours:1,rate:SHOP_RATE,parts:0,severity:"minor"});render();};
function totals(){const labour=state.lineItems.reduce((s,i)=>s+i.hours*i.rate,0);const parts=state.lineItems.reduce((s,i)=>s+(+i.parts||0),0);const sub=labour+parts,gst=sub*0.15;return{labour,parts,sub,gst,total:sub+gst};}
function recalc(){const el=document.getElementById("totals");if(el)el.innerHTML=totalsInner(totals());const li=document.querySelectorAll("[data-litotal]");li.forEach(n=>{const id=+n.getAttribute("data-litotal");const it=state.lineItems.find(x=>x.id===id);if(it)n.innerHTML=`Item total <b>$${(it.hours*it.rate+(+it.parts||0)).toFixed(2)}</b>`;});}
const go=s=>{state.screen=s;render();};
const reset=()=>{state.screen="capture";state.photos=[];state.damage=null;state.lineItems=[];state.error="";render();};

const ORDER=["capture","analyzing","review","quote","export"];
function journey(){
  const steps=[["capture","Photos"],["review","Assessment"],["quote","Estimate"],["export","Done"]];
  const cur=ORDER.indexOf(state.screen);
  let html="";
  steps.forEach((st,i)=>{
    const my=ORDER.indexOf(st[0]);
    const done=cur>my, now=state.screen===st[0]||(st[0]==="review"&&state.screen==="analyzing");
    html+=`<div class="jstep ${done?'done':''} ${now?'now':''}"><div class="jdot">${done?'✓':i+1}</div><div class="jlabel">${st[1]}</div></div>`;
    if(i<steps.length-1)html+=`<div class="jbar ${done?'filled':''}"><div class="fill"></div></div>`;
  });
  return html;
}

function totalsInner(t){
  return `
    <div class="totline"><span>Labour</span><span>$${t.labour.toFixed(2)}</span></div>
    <div class="totline"><span>Parts</span><span>$${t.parts.toFixed(2)}</span></div>
    <div class="totline"><span>GST (15%)</span><span>$${t.gst.toFixed(2)}</span></div>
    <div class="totline grand"><span>Total</span><span class="amt">$${t.total.toFixed(2)}</span></div>`;
}

function render(){
  const s=state.screen; let body="";

  if(s==="capture"){
    const v=state.vehicle;
    const vf=(k,ph,span)=>`<div class="${span?'span2':''}"><label class="field-label">${ph}</label><input class="fld" placeholder="${ph}" value="${esc(v[k])}" oninput="setVeh('${k}',this.value)"></div>`;
    const photos=state.photos.map((p,i)=>`<div class="photo fade"><img src="${p.dataUrl}"><button class="del" onclick="delPhoto(${i})">×</button></div>`).join("");
    body=`
      <h1 class="h1">Let's see the damage</h1>
      <p class="sub">Add a few photos of the vehicle and we'll prepare a repair estimate in seconds.</p>
      <div class="card">
        <div class="card-h">Vehicle details</div>
        <div class="card-hint">Pop in the rego and we'll do the rest later via lookup.</div>
        <div class="vgrid">
          ${vf("rego","Rego plate",true)}
          ${vf("make","Make")}${vf("model","Model")}
          ${vf("year","Year")}${vf("colour","Colour")}
        </div>
      </div>
      <div class="card">
        <div class="card-h">Damage photos ${state.photos.length?`· ${state.photos.length}`:""}</div>
        <div class="card-hint">4–8 clear shots covering every damaged area work best.</div>
        <div class="pgrid">
          ${photos}
          <div class="addtile" onclick="pickPhotos()"><span class="pic">＋</span><span class="t">Add photos</span></div>
        </div>
      </div>
      ${state.error?`<div class="err fade">${esc(state.error)}</div>`:""}
      <button class="btn btn-primary" onclick="analyze()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="19" height="19"><path d="M12 3v3m0 12v3M3 12h3m12 0h3M5.6 5.6l2.1 2.1m8.6 8.6l2.1 2.1m0-12.8l-2.1 2.1m-8.6 8.6l-2.1 2.1"/><circle cx="12" cy="12" r="3.5"/></svg>
        Get instant estimate
      </button>`;
  }

  else if(s==="analyzing"){
    body=`
      <div class="analysing">
        <div class="scanner"><svg viewBox="0 0 24 24" fill="none" stroke="#0E8B8B" stroke-width="2"><path d="M3 12a9 9 0 1018 0 9 9 0 00-18 0z"/><path d="M12 8v4l3 2"/></svg></div>
        <div class="anah">Assessing the damage…</div>
        <div class="anasub">Looking over ${Math.min(state.photos.length,6)} photo${state.photos.length>1?'s':''} to identify affected panels and repair methods.</div>
      </div>`;
  }

  else if(s==="review"&&state.damage){
    const d=state.damage;
    const flags=(d.flags||[]).filter(Boolean).map(f=>`<span class="pill" style="background:var(--rose-soft);color:var(--rose);"><span class="pdot" style="background:var(--rose);"></span>${esc(f)}</span>`).join("");
    const panels=d.panels.map(p=>{
      const sv=SEV[p.severity]||SEV.moderate;
      return `<div class="panel-row fade">
        <div class="panel-top">
          <div class="panel-name">${esc(p.panel)}</div>
          <span class="pill" style="background:${sv.bg};color:${sv.c};"><span class="pdot" style="background:${sv.c};"></span>${sv.label}</span>
        </div>
        ${p.notes?`<div class="panel-notes">${esc(p.notes)}</div>`:""}
        <div class="panel-meta"><span>Method <b>${esc(p.repair_method)}</b></span><span>Labour <b>${p.labour_hours}h</b></span></div>
      </div>`;
    }).join("");
    body=`
      <h1 class="h1">Here's what we found</h1>
      <p class="sub">A quick assessment of the damage. You can fine-tune everything on the next step.</p>
      <div class="card assess-summary fade">
        <div class="card-h">Summary</div>
        <div style="font-size:15px;line-height:1.55;margin-top:4px;">${esc(d.summary)}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;">
          <span class="pill" style="background:var(--teal-soft);color:var(--teal-deep);">Paint · ${esc(d.paint_complexity||"standard")}</span>
          ${flags}
        </div>
      </div>
      <div style="font-size:13px;font-weight:600;color:var(--slate);margin:18px 2px 12px;">AFFECTED PANELS · ${d.panels.length}</div>
      ${panels}
      <div class="btnrow" style="margin-top:18px;">
        <button class="btn btn-ghost" onclick="go('capture')">Back</button>
        <button class="btn btn-primary grow" onclick="go('quote')">Build the estimate</button>
      </div>`;
  }

  else if(s==="quote"){
    const t=totals();
    const items=state.lineItems.map(it=>{
      const sv=SEV[it.severity]||SEV.minor;
      return `<div class="li fade" style="border-left:3px solid ${sv.c};">
        <input class="li-desc" value="${esc(it.desc)}" oninput="updItem(${it.id},'desc',this.value)">
        <div class="li-inputs">
          <div><label class="mini-label">Hours</label><input class="mini-fld" type="number" value="${it.hours}" oninput="updItem(${it.id},'hours',parseFloat(this.value)||0)"></div>
          <div><label class="mini-label">Rate $</label><input class="mini-fld" type="number" value="${it.rate}" oninput="updItem(${it.id},'rate',parseFloat(this.value)||0)"></div>
          <div><label class="mini-label">Parts $</label><input class="mini-fld" type="number" value="${it.parts}" oninput="updItem(${it.id},'parts',parseFloat(this.value)||0)"></div>
          <button class="li-del" onclick="remItem(${it.id})">×</button>
        </div>
        <div class="li-total" data-litotal="${it.id}">Item total <b>$${(it.hours*it.rate+(+it.parts||0)).toFixed(2)}</b></div>
      </div>`;
    }).join("");
    const itemsCol=`
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--slate);margin:2px 2px 12px;">REPAIR ITEMS</div>
        ${items}
        <button class="add-line" onclick="addItem()">＋ Add a repair item</button>
      </div>`;
    const totalsCol=`
      <div class="desktop-sticky">
        <div class="totals" id="totals">${totalsInner(t)}</div>
        <div class="btnrow" style="margin-top:16px;">
          <button class="btn btn-ghost" onclick="go('review')">Back</button>
          <button class="btn btn-primary grow" onclick="go('export')">Finish estimate</button>
        </div>
      </div>`;
    body=`
      <h1 class="h1">Your estimate</h1>
      <p class="sub">Adjust hours, rates or parts and the total updates instantly.</p>
      <div class="desktop-split">${itemsCol}${totalsCol}</div>`;
  }

  else if(s==="export"){
    const t=totals();
    body=`
      <div style="text-align:center;padding-top:14px;" class="fade">
        <div class="success-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#4CAF82" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg></div>
        <h1 class="h1">Estimate ready</h1>
        <p class="sub" style="margin:0 auto 22px;">A clean ${state.lineItems.length}-item quote totalling <b style="color:var(--teal-deep);">$${t.total.toFixed(2)}</b>, ready to send.</p>
      </div>
      <div class="totals" style="margin-bottom:16px;">${totalsInner(t)}</div>
      <button class="btn btn-primary" onclick="alert('In the full build this sends straight to Panel Quote via the Chrome extension.')">
        Send to Panel Quote
      </button>
      <div class="btnrow" style="margin-top:11px;">
        <button class="btn btn-ghost" onclick="alert('PDF export comes with the full build.')">Save as PDF</button>
        <button class="btn btn-ghost" onclick="go('quote')">Edit estimate</button>
      </div>
      <div class="info-strip">
        <span>💡</span>
        <span>Open Panel Quote in Chrome and tap the CrashQuote extension — it fills every field for you, then you review and submit.</span>
      </div>
      <button class="btn btn-ghost" style="margin-top:14px;color:var(--slate);" onclick="reset()">Start a new quote</button>`;
  }

  document.getElementById("app").innerHTML=`
    <div class="topbar">
      <div class="brand">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M5 13l1.5-4.5A2 2 0 018.4 7h7.2a2 2 0 011.9 1.5L19 13M5 13h14M5 13v4m14-4v4M7 17h2m6 0h2"/><circle cx="7.5" cy="14.5" r="1"/><circle cx="16.5" cy="14.5" r="1"/></svg></div>
        <div><div class="brandname">CrashQuote</div><div class="brandsub">Repair estimates, instantly</div></div>
      </div>
      <div class="trust"><span class="dot"></span>AI-assisted</div>
    </div>
    <div class="journey">${journey()}</div>
    <div class="content">${body}</div>`;
}
render();
</script>
</body>
</html>
